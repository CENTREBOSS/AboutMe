<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARISH GOOD GAME</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="text-3d">SARISH GOOD GAME</h1>
        
        <div class="music-player-container">
            <audio id="main-audio" controls>
                <source src="DROPBOX_LINK_1" type="audio/mpeg">
                Brauzeringiz audioni qo'llab-quvvatlamaydi.
            </audio>
            
            <div class="playlist">
                <button class="song-btn active" data-src="https://www.dropbox.com/scl/fi/cgzf70t9viimt9fyit7jk/Good-Game-Good-Night.mp3?rlkey=gx9hkhcbtm6hk2f7kv8zrdxpw&st=ff6t4kf2&dl=1">
                    <i class="fas fa-play"></i> <span>1. SARISH GG</span>
                </button>
                <button class="song-btn" data-src="https://www.dropbox.com/scl/fi/r18l29p8sk0x05od7ftse/Sarish-Good-Game.mp3?rlkey=vehesth6m2wiu2x104kvwmw1z&st=7pjgiq4a&dl=1">
                    <i class="fas fa-music"></i> <span>2.  SARISH GG</span>
                </button>
                <button class="song-btn" data-src="https://www.dropbox.com/scl/fi/d49o5iy1xfhnrcauqwdmm/Sigma-Sarish-Mode.mp3?rlkey=7o037izkmuvauivt8puwqsg1q&st=gkg3idql&dl=1">
                    <i class="fas fa-music"></i> <span>3.  SARISH GG</span>
                </button>
                <button class="song-btn" data-src="https://www.dropbox.com/scl/fi/2qln7i954zy25zu40w5dn/UNCLEFLEXXX-SMS-dance-remix-2.mp3?rlkey=ddr6z61bhcfivzrqqt82agq2f&st=dzk076o1&dl=1">
                    <i class="fas fa-music"></i> <span>4.  SARISH GG</span>
                </button>
                <button class="song-btn" data-src="https://www.dropbox.com/scl/fi/xa34df2f0qc34smcyhnqd/UNCLEFLEXXX-SMS-dance-remix-6.mp3?rlkey=7v0f9u181tw24lsktpus5f731&st=rlxp4b5e&dl=1">
                    <i class="fas fa-music"></i> <span>5.  SARISH GG</span>
                </button>
            </div>
        </div>
        
        <div class="card">
            <p class="intro">Assalomu alaykum men <strong>SARISH GG</strong>, men bir vaqtni o'zida:</p>
            
            <ul class="skills-list">
                <li><i class="fas fa-gamepad"></i> <span>1. Gamer</span></li>
                <li><i class="fas fa-microphone-alt"></i> <span>2. Dublyajchi (Anime)</span></li>
                <li><i class="fas fa-user-secret"></i> <span>3. Ethical Hacker</span></li>
                <li><i class="fas fa-code"></i> <span>4. Dasturchi (AI, WEB, APP)</span></li>
            </ul>
            
            <p class="outro">Hisoblanaman, menga obuna bo'ling siz bilan o'yinlar olamiga sho'ng'iymiz!</p>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/sarishgg?igsh=MWNydmhkbjBycHczbg==" target="_blank" class="social-btn instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://t.me/SARISHGG" target="_blank" class="social-btn telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://www.youtube.com/@SARISHGG" target="_blank" class="social-btn youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
        </div>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const buttons = document.querySelectorAll('.song-btn');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const isAlreadyPlaying = button.classList.contains('active');
                
                // Barcha tugmalardan active klassini va fa-play iconini olib tashlash
                buttons.forEach(btn => {
                    btn.classList.remove('active');
                    btn.querySelector('i').classList.replace('fa-play', 'fa-music');
                    btn.style.boxShadow = "none";
                });

                // Bosilgan tugmaga active klassini qo'shish
                button.classList.add('active');
                button.querySelector('i').classList.replace('fa-music', 'fa-play');

                // Musiqani almashtirish va chalish
                const newSrc = button.getAttribute('data-src');
                
                if (audio.src !== newSrc && newSrc !== "DROPBOX_LINK_1") { // Dropbox linklar qo'yilganda ishlaydi
                    audio.src = newSrc;
                    audio.play();
                } else if (!isAlreadyPlaying) {
                    audio.play();
                }
            });
        });

        // Musiqa tugaganda avtomatik keyingisiga o'tishi uchun (ixtiyoriy qo'shimcha)
        audio.addEventListener('ended', () => {
            let activeBtn = document.querySelector('.song-btn.active');
            let nextBtn = activeBtn.nextElementSibling;
            if(nextBtn) {
                nextBtn.click();
            } else {
                buttons[0].click(); // Oxiriga yetganda boshidan boshlash
            }
        });
    </script>
</body>
</html>
